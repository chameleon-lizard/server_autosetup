set-option -sa terminal-overrides ",xterm*:Tc"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Pane borders
set -g pane-active-border-style "fg=#767676"
set -g pane-border-style "fg=#3a3a3a"

# Status bar
set -g status-style "bg=#1c1c1c,fg=#767676"
set -g status-left-length 25
set -g status-left "#[bg=#3a3a3a,fg=#9e9e9e,bold] #{=18:session_name} #[bg=#1c1c1c] "
set -g status-right "#[bg=#3a3a3a,fg=#767676] %d %b #[bg=#585858,fg=#1c1c1c,bold] %H:%M "

# Inactive windows
set -g window-status-format "#[bg=#2a2a2a,fg=#af875f] #I #[bg=#1c1c1c,fg=#585858] #W "

# Active window
set -g window-status-current-format "#[bg=#af875f,fg=#1c1c1c,bold] #I #[bg=#3a3a3a,fg=#bcbcbc,bold] #W "

# Keybinds
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{session_path}"
set-hook -g session-created 'if-shell -F "#{?#{m/r:^[0-9]+$,#{session_name}},1,0}" "rename-session \"#{b:session_path}\""'
